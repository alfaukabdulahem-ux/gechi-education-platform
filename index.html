<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Space Option ⫸</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Floating Left Menu Toggle -->
<div id="menu-toggle">⇋</div>

<!-- Main Options Section (hidden initially) -->
<div class="options-section" id="main-options">
    <div class="option-button" data-option="1">Qunnamtiif</div>
    <div class="option-button" data-option="2">Gargaarsaaf</div>
    <div class="option-button" data-option="3">⫸</div>
</div>

<!-- Background Section -->
<div class="background-section">
    <img src="mosque.png" alt="Masjida" class="mosque-image">
    <div class="header-text">
        <h1>Waldaa Barnootaa fi Misooma Muslimoota Geechii</h1>
    </div>
</div>

<!-- Display Section -->
<div class="display-section">
    <div id="display-text"></div>
    
    <!-- Input box for secure option ⫸ -->
    <div id="secure-input-container" style="display:none;">
        <input type="password" id="secure-input" placeholder="Password barreessi...">
        <button id="secure-save-btn">Save</button>
    </div>
</div>

<!-- Help Text at End -->
<div class="help-section" id="help-section">
    <p>Gargaarsaaf: Button irratti tuqi, wanti ati barreessite achi argama.</p>
</div>

<script src="script.js"></script>
</body>
</html>
